<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>JSN AIQ Readiness Assessment</title>
<meta name="description" content="JSN AIQ Readiness Assessment. Find out where your business stands on AI adoption. 25 questions, 5 minutes, a prioritized action plan." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=IBM+Plex+Mono:wght@300;400;500;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0B1121;
    --surface: #121C2F;
    --card: #151F33;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(29,198,194,0.25);
    --text: #FFFFFF;
    --muted: rgba(255,255,255,0.5);
    --dim: rgba(255,255,255,0.2);
    --accent: #1DC6C2;
    --orange: #FD6B2B;
    --mono: 'IBM Plex Mono', monospace;
    --serif: 'EB Garamond', Georgia, serif;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 16px;
    position: relative;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: linear-gradient(rgba(29,198,194,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(29,198,194,0.04) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
    z-index: 0;
  }
  .wrap { position: relative; z-index: 1; width: 100%; max-width: 680px; }
  .back-link {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
    color: #FFFFFF; text-decoration: none; margin-bottom: 20px;
    transition: color 0.15s;
  }
  .back-link:hover { color: var(--text); }
  .card {
    background: var(--surface);
    border: 1px solid rgba(29,198,194,0.15);
    padding: 52px 44px;
    position: relative;
  }
  .card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, #1DC6C2, transparent);
    opacity: 0.6;
  }
  .eyebrow {
    font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--accent); margin-bottom: 16px;
    display: flex; align-items: center; gap: 10px;
  }
  .eyebrow::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  h1 { font-family: var(--serif); font-size: clamp(30px,5vw,50px); font-weight: 400; line-height: 1.1; margin-bottom: 20px; }
  h1 em { color: var(--accent); font-style: italic; }
  .lead { font-size: 14px; line-height: 1.75; color: #FFFFFF; margin-bottom: 36px; }
  .domain-pills { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 40px; }
  .pill { font-size: 10px; letter-spacing: 0.1em; padding: 5px 12px; border: 1px solid var(--border); color: #FFFFFF; display: flex; align-items: center; gap: 6px; }
  .pill-dot { width: 5px; height: 5px; border-radius: 50%; }
  .btn { background: var(--orange); color: #FFFFFF; border: none; padding: 15px 36px; font-family: var(--mono); font-size: 11px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; cursor: pointer; transition: opacity 0.15s; }
  .btn:hover { opacity: 0.88; }
  .btn-ghost { background: transparent; color: #FFFFFF; border: 1px solid var(--border); padding: 12px 24px; font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; cursor: pointer; transition: border-color 0.15s, color 0.15s; }
  .btn-ghost:hover { border-color: #1DC6C2; color: #1DC6C2; }
  .progress-bar { height: 1px; background: var(--border); margin-bottom: 44px; position: relative; }
  .progress-fill { height: 100%; background: #1DC6C2; transition: width 0.4s ease; }
  .progress-label { position: absolute; right: 0; top: 6px; font-size: 10px; color: #FFFFFF; }
  .domain-tag { display: inline-flex; align-items: center; gap: 8px; padding: 6px 14px; border: 1px solid; font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; margin-bottom: 28px; }
  .question-text { font-family: var(--serif); font-size: clamp(17px,3vw,24px); line-height: 1.55; margin-bottom: 36px; min-height: 80px; transition: opacity 0.2s, transform 0.2s; }
  .question-text.fade { opacity: 0; transform: translateY(6px); }
  .answer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 36px; transition: opacity 0.2s; }
  .answer-grid.fade { opacity: 0; }
  .answer-btn { background: var(--surface); border: 1px solid var(--border); color: #FFFFFF; padding: 18px 16px; cursor: pointer; text-align: left; font-family: var(--mono); transition: background 0.12s, border-color 0.12s; }
  .answer-btn:hover { background: rgba(29,198,194,0.05); border-color: rgba(29,198,194,0.3); }
  .answer-btn.selected { background: rgba(29,198,194,0.1); border-color: #1DC6C2; }
  .answer-num { font-size: 22px; font-weight: 700; color: #1DC6C2; display: block; margin-bottom: 4px; }
  .answer-label { font-size: 12px; display: block; margin-bottom: 2px; color: #FFFFFF; }
  .answer-sub { font-size: 10px; color: rgba(255,255,255,0.7); display: block; }
  .domain-track { display: flex; gap: 6px; margin-top: 32px; }
  .domain-pip { flex: 1; height: 2px; background: var(--border); transition: background 0.3s; }
  .score-display { display: flex; align-items: baseline; gap: 12px; margin-bottom: 12px; }
  .score-num { font-family: var(--serif); font-size: 80px; line-height: 1; font-weight: 400; }
  .score-denom { font-size: 14px; color: #FFFFFF; }
  .level-badge { display: inline-flex; align-items: center; gap: 8px; padding: 6px 14px; border: 1px solid; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 16px; }
  .maturity-desc { font-size: 14px; line-height: 1.7; color: #FFFFFF; margin-bottom: 40px; padding-left: 16px; border-left: 2px solid rgba(255,255,255,0.3); }
  .results-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; margin-bottom: 40px; align-items: center; }
  .radar-wrap { display: flex; justify-content: center; }
  .domain-bars { display: flex; flex-direction: column; gap: 14px; }
  .bar-header { display: flex; justify-content: space-between; margin-bottom: 5px; }
  .bar-name { font-size: 10px; color: #FFFFFF; letter-spacing: 0.06em; }
  .bar-score { font-size: 11px; font-weight: 700; }
  .bar-track { height: 2px; background: var(--border); }
  .bar-fill { height: 100%; transition: width 1.2s cubic-bezier(0.16,1,0.3,1); }
  .section-label { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: #FFFFFF; margin-bottom: 20px; }
  .gap-item { border-left: 2px solid; padding-left: 20px; margin-bottom: 24px; }
  .gap-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .gap-name { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: #FFFFFF; }
  .gap-score { font-size: 11px; font-weight: 700; margin-left: auto; }
  .gap-action { font-size: 12px; color: #FFFFFF; display: flex; gap: 12px; line-height: 1.5; margin-bottom: 6px; }
  .gap-arrow { color:#FFFFFF; flex-shrink: 0; }
  .divider { border: none; border-top: 1px solid var(--border); margin: 32px 0; }
  .btn-row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
  .footer { margin-top: 28px; text-align: center; font-size: 10px; letter-spacing: 0.1em; color: #FFFFFF; }
  .footer a { color: var(--accent); text-decoration: none; }
  .footer a:hover { text-decoration: underline; }
  @media (max-width: 560px) {
    .card { padding: 32px 20px; }
    .results-grid { grid-template-columns: 1fr; }
  }
</style>

      "If a key employee left tomorrow, would the information they carry in their head or on their personal device be lost to the business?",

const MATURITY = [

  { min: 21,  max: 40,  level: 2, name: "Aware",         color: "#FF8C00", desc: "Leadership knows AI matters but nothing formal is underway. Identify a champion, set a small budget, and run one focused pilot." },

  talent:     ["Launch a company-wide AI literacy program (even 4 hours can shift culture)", "Identify internal AI champions and give them dedicated time to experiment", "Create a safe sandbox for employees to test tools without risk", "Build job descriptions that explicitly value data and AI fluency"],
  current:    ["Audit current tools for AI features you are already paying for but not using", "Automate your highest-volume, lowest-complexity repetitive tasks first", "Integrate an AI assistant into customer-facing workflows for a 30-day test", "Establish a formal ROI tracking process for any AI or automation investment"],

let screen = "intro";
let answers = {};
let domainIndex = 0;
let qIndex = 0;
let results = null;
let animating = false;

const totalQ = DOMAINS.reduce((s, d) => s + d.questions.length, 0);
function answeredCount() { return Object.keys(answers).length; }
function akey(dId, qi) { return dId + "_" + qi; }

function calcResults() {
  const domainScores = {};
  DOMAINS.forEach(d => {
    const vals = d.questions.map((_, i) => answers[akey(d.id, i)] || 1);
    const avg = vals.reduce((s, v) => s + v, 0) / vals.length;
    domainScores[d.id] = Math.round(((avg - 1) / 3) * 100);
  });
  const composite = Math.round(DOMAINS.reduce((s, d) => s + domainScores[d.id] * d.weight, 0));
  const maturity = MATURITY.find(m => composite >= m.min && composite <= m.max) || MATURITY[0];
  const gaps = DOMAINS.filter(d => domainScores[d.id] < 50).sort((a, b) => domainScores[a.id] - domainScores[b.id]);
  return { domainScores, composite, maturity, gaps };
}

function radarSVG(domainScores) {
  const cx = 130, cy = 130, r = 95, n = DOMAINS.length;
  let out = "";
  [0.25, 0.5, 0.75, 1].forEach(pct => {
    const pts = DOMAINS.map((_, i) => {
      const a = (i / n) * 2 * Math.PI - Math.PI / 2;
      return (cx + r * pct * Math.cos(a)) + "," + (cy + r * pct * Math.sin(a));
    }).join(" ");
    out += `<polygon points="${pts}" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>`;
  });
  DOMAINS.forEach((_, i) => {
    const a = (i / n) * 2 * Math.PI - Math.PI / 2;
    out += `<line x1="${cx}" y1="${cy}" x2="${cx + r * Math.cos(a)}" y2="${cy + r * Math.sin(a)}" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>`;
  });
  const pts = DOMAINS.map((d, i) => {
    const a = (i / n) * 2 * Math.PI - Math.PI / 2;
    const pct = (domainScores[d.id] || 0) / 100;
    return { x: cx + r * pct * Math.cos(a), y: cy + r * pct * Math.sin(a), color: d.color };
  });
  out += `<polygon points="${pts.map(p => p.x + "," + p.y).join(" ")}" fill="rgba(29,198,194,0.08)" stroke="#1DC6C2" stroke-width="1.5"/>`;
  pts.forEach((p, i) => { out += `<circle cx="${p.x}" cy="${p.y}" r="3.5" fill="${DOMAINS[i].color}"/>`; });
  DOMAINS.forEach((d, i) => {
    const a = (i / n) * 2 * Math.PI - Math.PI / 2;
    out += `<text x="${cx + (r + 22) * Math.cos(a)}" y="${cy + (r + 22) * Math.sin(a)}" text-anchor="middle" dominant-baseline="middle" font-size="11" fill="rgba(255,255,255,0.45)" font-family="monospace">${d.icon}</text>`;
  });
  return `<svg viewBox="0 0 260 260" style="width:100%;max-width:260px">${out}</svg>`;
}

      <button class="btn" onclick="startAssessment()">Begin Assessment →</button>
    `;
    return;
  }

  if (screen === "assessment") {
    const d = DOMAINS[domainIndex];

    const gapHTML = gaps.length
      ? gaps.map(d => `
          <div class="gap-item" style="border-color:${d.color}">
            <div class="gap-header">
              <span style="color:${d.color}">${d.icon}</span>
              <span class="gap-name">${d.label}</span>
              <span class="gap-score" style="color:${d.color}">${domainScores[d.id]} / 100</span>
            </div>
            ${USE_CASES[d.id].slice(0, 3).map(uc => `<div class="gap-action"><span class="gap-arrow" style="color:rgba(255,255,255,0.6)">→</span><span style="color:#FFFFFF">${uc}</span></div>`).join("")}
          </div>`).join("")
      : `<p style="font-size:13px;color:#FFFFFF">No critical gaps. Focus on sustaining and scaling what is working.</p>`;

    app.innerHTML = `
      <div class="eyebrow">// ASSESSMENT COMPLETE</div>
      <div class="level-badge" style="border-color:${maturity.color};color:${maturity.color}">Level ${maturity.level} &nbsp;·&nbsp; ${maturity.name}</div>
      <div class="score-display">
        <div class="score-num" style="color:${maturity.color}">${composite}</div>
        <div class="score-denom">/ 100</div>
      </div>
      <p class="maturity-desc">${maturity.desc}</p>
      <div class="results-grid">
        <div class="radar-wrap">${radarSVG(domainScores)}</div>
        <div class="domain-bars">
          ${DOMAINS.map(d => `
            <div>
              <div class="bar-header">
                <span class="bar-name" style="color:#FFFFFF">${d.icon} ${d.label}</span>
                <span class="bar-score" style="color:${d.color}">${domainScores[d.id]}</span>
              </div>
              <div class="bar-track"><div class="bar-fill" id="bar-${d.id}" style="width:0%;background:${d.color}"></div></div>
            </div>`).join("")}
        </div>
      </div>
      ${gaps.length ? '<div class="section-label">Priority Gaps. Domains Below 50</div>' : ""}
      ${gapHTML}
      <hr class="divider"/>

      <!-- AUDIT CTA -->
      <div id="audit-cta" style="margin-bottom:24px">
        <div style="background:rgba(212,168,67,0.04);border:1px solid rgba(212,168,67,0.25);padding:32px;margin-bottom:16px;position:relative;overflow:hidden">
          <div style="position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent)"></div>
          <div style="font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:#1DC6C2;margin-bottom:12px;font-family:var(--mono)">JSN AIQ Audit. Professional Service</div>
          <div style="font-family:'EB Garamond',serif;font-size:clamp(20px,3vw,28px);line-height:1.2;margin-bottom:12px" id="audit-headline">Get a full AI roadmap built for your business</div>
          <div style="font-size:13px;color:#FFFFFF;line-height:1.7;margin-bottom:24px" id="audit-body">Loading...</div>
          <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:8px">
            <div style="font-size:12px;color:#FFFFFF;display:flex;align-items:center;gap:6px"><span style="color:var(--accent)">✓</span> Deep-dive audit session</div>
            <div style="font-size:12px;color:#FFFFFF;display:flex;align-items:center;gap:6px"><span style="color:var(--accent)">✓</span> Written AI roadmap</div>
            <div style="font-size:12px;color:#FFFFFF;display:flex;align-items:center;gap:6px"><span style="color:var(--accent)">✓</span> Prioritized action plan</div>
            <div style="font-size:12px;color:#FFFFFF;display:flex;align-items:center;gap:6px"><span style="color:var(--accent)">✓</span> Implementation guidance</div>
          </div>
          <div style="font-size:11px;color:#FFFFFF;font-family:var(--mono);margin-bottom:24px">Starting at $1,000 &nbsp;·&nbsp; Limited availability</div>
          <button class="btn" onclick="showAuditForm()">Request Your AIQ Audit →</button>
        </div>

        <!-- INQUIRY FORM -->
        <div id="audit-form" style="display:none;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.08);padding:32px">
          <div style="font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:var(--accent);margin-bottom:20px;font-family:var(--mono)">Tell Us About Your Business</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">
            <input id="aq-name" placeholder="Your name" style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);color:#FFFFFF;padding:12px 14px;font-family:var(--mono);font-size:12px;outline:none;width:100%" onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='rgba(255,255,255,0.1)'"/>
            <input id="aq-email" placeholder="Work email" style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);color:#FFFFFF;padding:12px 14px;font-family:var(--mono);font-size:12px;outline:none;width:100%" onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='rgba(255,255,255,0.1)'"/>
          </div>
          <input id="aq-company" placeholder="Company name" style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);color:#FFFFFF;padding:12px 14px;font-family:var(--mono);font-size:12px;outline:none;width:100%;margin-bottom:12px"/>
          <textarea id="aq-challenge" placeholder="What is your biggest operational challenge right now?" rows="3" style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);color:#FFFFFF;padding:12px 14px;font-family:var(--mono);font-size:12px;outline:none;width:100%;resize:vertical;margin-bottom:20px"></textarea>
          <div id="aq-error" style="display:none;color:#FF6B6B;font-size:11px;font-family:var(--mono);margin-bottom:12px"></div>
          <div style="display:flex;gap:12px;flex-wrap:wrap">
            <button class="btn" id="aq-submit-btn" onclick="submitAuditInquiry()">Submit Inquiry →</button>
            <button class="btn-ghost" onclick="hideAuditForm()">Cancel</button>
          </div>
        </div>

        <!-- CONFIRMATION + BOOK CALL -->
        <div id="audit-confirm" style="display:none;background:rgba(91,224,160,0.04);border:1px solid rgba(91,224,160,0.2);padding:32px;text-align:center">
          <div style="font-size:24px;margin-bottom:16px">✓</div>
          <div style="font-family:'EB Garamond',serif;font-size:24px;margin-bottom:10px">Inquiry received</div>
          <div style="font-size:13px;color:#FFFFFF;line-height:1.7;margin-bottom:28px;max-width:420px;margin-left:auto;margin-right:auto">We'll review your assessment results and be in touch within 24 hours. In the meantime, book a time directly so we can hit the ground running.</div>
          <a id="calendly-link" href="https://calendly.com/jsnmade-pm/30min" target="_blank" style="display:inline-block;background:var(--accent);color:#07080F;padding:14px 32px;font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;text-decoration:none;margin-bottom:16px">Book Your Discovery Call →</a>
          <div style="font-size:10px;color:#FFFFFF;font-family:var(--mono)">30 minutes &nbsp;·&nbsp; No obligation &nbsp;·&nbsp; Come as you are</div>
        </div>
      </div>

      <!-- TRAINING CTA -->
      <div style="background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.07);padding:24px;margin-bottom:24px">
        <div style="font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:#1DC6C2;margin-bottom:8px;font-family:var(--mono)">Prefer to start yourself?</div>
        <div style="font-family:'EB Garamond',serif;font-size:18px;margin-bottom:8px">Access your free AI training curriculum</div>
        <div style="font-size:13px;color:#FFFFFF;line-height:1.6;margin-bottom:16px">Lessons, quizzes, and a live AI coach matched to your maturity level.</div>
        <button class="btn-ghost" onclick="goToTraining()">Start My Training →</button>
      </div>

      <div class="btn-row">
        <button class="btn-ghost" onclick="restart()">Retake Assessment</button>
        <button class="btn-ghost" onclick="copyResults()">Copy Results</button>
      </div>
    `;
    setTimeout(() => {
      DOMAINS.forEach(d => {
        const el = document.getElementById("bar-" + d.id);
        if (el) el.style.width = domainScores[d.id] + "%";
      });
      // Set score-aware audit copy
      setAuditCopy(maturity.level);
    }, 80);
  }
}

function startAssessment() { screen = "assessment"; domainIndex = 0; qIndex = 0; render(); }

function handleAnswer(val) {
  if (animating) return;
  answers[akey(DOMAINS[domainIndex].id, qIndex)] = val;
  animating = true;
  const qt = document.getElementById("qtext");
  const ag = document.getElementById("agrid");
  if (qt) qt.classList.add("fade");
  if (ag) ag.classList.add("fade");
  setTimeout(() => {
    if (qIndex < DOMAINS[domainIndex].questions.length - 1) { qIndex++; }
    else if (domainIndex < DOMAINS.length - 1) { domainIndex++; qIndex = 0; }
    else { results = calcResults(); submitToKV(results); screen = "results"; }
    animating = false;
    render();
  }, 220);
}

function submitToKV(res) {
  const KV_WORKER = "https://jsn-aiq-kv.wewearsmiles.workers.dev/submit";
  const payload = {
    name: "",
    email: "",
    score: res.composite,
    level: res.maturity.name,
    domainScores: res.domainScores,
    timestamp: new Date().toISOString()
  };
  fetch(KV_WORKER, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload)
  }).catch(err => console.warn("KV submit failed silently:", err));
}

function restart() { answers = {}; domainIndex = 0; qIndex = 0; results = null; screen = "intro"; render(); }

// ── AUDIT CTA ─────────────────────────────────────────────────────────────
const AUDIT_COPY = {
  1: { headline: "Your business needs an AI foundation. we'll build the roadmap with you.", body: "Your assessment shows you're at the early stages of AI readiness. The gap between where you are and where your competitors are heading is closing fast. A JSN AIQ Audit gives you a concrete, prioritized roadmap so you know exactly what to do first. without wasting time or money on the wrong tools." },
  2: { headline: "You know AI matters. Now it's time to build a plan that actually works.", body: "Your assessment shows awareness but no formal strategy yet. That's the most dangerous position. you know enough to know you're behind, but not enough to know where to start. A JSN AIQ Audit turns that uncertainty into a clear 90-day action plan tailored to your business." },
  3: { headline: "You're experimenting with AI. Let's turn pilots into real results.", body: "Your assessment shows active experimentation. which means you're ahead of most. But pilots without a scaling strategy stay pilots. A JSN AIQ Audit identifies which of your current efforts have the highest ROI potential and builds the infrastructure to scale them." },
  4: { headline: "You're scaling AI. Let's make sure you're building on the right foundation.", body: "Your assessment shows strong AI adoption across your organization. The risk at this stage is scaling the wrong things or missing governance gaps that become expensive later. A JSN AIQ Audit gives you an independent validation of your strategy and identifies the highest-leverage next moves." },
  5: { headline: "You're transforming. Let's make sure AI stays a competitive advantage.", body: "Your assessment shows exceptional AI maturity. At this level, the work shifts to sustaining competitive differentiation and building the culture and governance that keep AI working for you as the landscape evolves. A JSN AIQ Audit ensures your strategy stays ahead of the curve." }
};

function setAuditCopy(level) {
  const copy = AUDIT_COPY[level] || AUDIT_COPY[2];
  const el = document.getElementById("audit-headline");
  const body = document.getElementById("audit-body");
  if (el) el.textContent = copy.headline;
  if (body) body.textContent = copy.body;
}

function showAuditForm() {
  document.getElementById("audit-form").style.display = "block";
  document.getElementById("audit-form").scrollIntoView({ behavior: "smooth", block: "start" });
}

function hideAuditForm() {
  document.getElementById("audit-form").style.display = "none";
}

async function submitAuditInquiry() {
  const name = document.getElementById("aq-name").value.trim();
  const email = document.getElementById("aq-email").value.trim();
  const company = document.getElementById("aq-company").value.trim();
  const challenge = document.getElementById("aq-challenge").value.trim();
  const errEl = document.getElementById("aq-error");
  const btn = document.getElementById("aq-submit-btn");

  errEl.style.display = "none";
  if (!name) { errEl.textContent = "Please enter your name."; errEl.style.display = "block"; return; }
  if (!email || !email.includes("@")) { errEl.textContent = "Please enter a valid email address."; errEl.style.display = "block"; return; }
  if (!company) { errEl.textContent = "Please enter your company name."; errEl.style.display = "block"; return; }

  btn.textContent = "Submitting...";
  btn.disabled = true;

  // Send to Constant Contact worker. same endpoint, tagged as audit inquiry
  const WORKER_URL = "https://cc-leads.YOUR-SUBDOMAIN.workers.dev";
  const nameParts = name.split(" ");

  try {
    await fetch(WORKER_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        firstName: nameParts[0],
        lastName: nameParts.slice(1).join(" ") || "",
        email,
        score: results ? results.composite : 0,
        level: results ? results.maturity.name : "",
        track: "Audit Inquiry. " + (company || "Unknown"),
        domainScores: results ? results.domainScores : {}
      })
    });
  } catch(e) {
    console.warn("Lead capture failed silently:", e);
  }

  // Always show confirmation
  btn.textContent = "Submit Inquiry →";
  btn.disabled = false;
  document.getElementById("audit-form").style.display = "none";
  document.getElementById("audit-confirm").style.display = "block";
  document.getElementById("audit-confirm").scrollIntoView({ behavior: "smooth", block: "start" });
}

function goToTraining() {
  if (!results) return;
  const { composite, domainScores } = results;
  const params = new URLSearchParams();
  params.set("score", composite);
  DOMAINS.forEach(d => params.set(d.id, domainScores[d.id]));
  window.location.href = "aiq-training.html?" + params.toString();
}

function copyResults() {
  if (!results) return;
  const { domainScores, composite, maturity } = results;
  const text = "AI Readiness Score: " + composite + "/100. " + maturity.name + " (Level " + maturity.level + ")\n\nDomain Scores:\n" +
    DOMAINS.map(d => "  " + d.label + ": " + domainScores[d.id] + "/100").join("\n") +
    "\n\nGenerated by JSN Made. jsnmade.com";
  navigator.clipboard.writeText(text).then(() => alert("Results copied to clipboard."));
}

render();
</script>
</body>
</html>
