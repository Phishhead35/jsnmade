<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AIQ Admin</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0B1121;
  --surface:#121C2F;
  --card:#151F33;
  --border:rgba(255,255,255,0.07);
  --border2:rgba(29,198,194,0.2);
  --text:#FFFFFF;
  --accent:#1DC6C2;
  --orange:#FD6B2B;
  --green:#5BE0A0;
  --red:#FF6B6B;
  --mono:'DM Mono',monospace;
  --sans:'DM Sans',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;-webkit-font-smoothing:antialiased}
body::after{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(29,198,194,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(29,198,194,0.03) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0}

/* LOGIN */
.login-wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:24px;z-index:10}
.login-card{background:var(--surface);border:1px solid var(--border2);padding:48px;max-width:400px;width:100%;position:relative}
.login-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent)}
.login-eyebrow{font-family:var(--mono);font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:var(--accent);margin-bottom:16px}
.login-title{font-size:24px;font-weight:500;margin-bottom:8px;color:#FFFFFF}
.login-sub{font-size:13px;color:#FFFFFF;margin-bottom:28px}
.login-input{width:100%;background:var(--card);border:1px solid var(--border2);color:#FFFFFF;padding:14px 16px;font-family:var(--mono);font-size:13px;outline:none;margin-bottom:12px;transition:border-color 0.15s}
.login-input:focus{border-color:var(--accent)}
.login-input::placeholder{color:rgba(255,255,255,0.3)}
.login-btn{width:100%;background:var(--orange);color:#FFFFFF;border:none;padding:14px;font-family:var(--mono);font-size:11px;font-weight:500;letter-spacing:0.15em;text-transform:uppercase;cursor:pointer;transition:opacity 0.15s}
.login-btn:hover{opacity:0.88}
.login-error{font-size:11px;color:var(--red);font-family:var(--mono);margin-top:8px;display:none}

/* APP */
.app{display:none;position:relative;z-index:1}

/* HEADER */
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:20px 40px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.header-brand{font-family:var(--mono);font-size:12px;letter-spacing:0.15em;text-transform:uppercase;color:var(--accent)}
.header-right{display:flex;align-items:center;gap:20px}
.header-stat{font-family:var(--mono);font-size:11px;color:#FFFFFF}
.header-stat span{color:var(--accent);font-size:16px;font-weight:500}
.logout-btn{font-family:var(--mono);font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:#FFFFFF;background:transparent;border:1px solid var(--border);padding:8px 16px;cursor:pointer;transition:border-color 0.15s}
.logout-btn:hover{border-color:var(--accent);color:var(--accent)}

/* CONTROLS */
.controls{padding:24px 40px;display:flex;gap:12px;flex-wrap:wrap;align-items:center;border-bottom:1px solid var(--border)}
.search-input{background:var(--card);border:1px solid var(--border2);color:#FFFFFF;padding:10px 16px;font-family:var(--mono);font-size:12px;outline:none;width:280px;transition:border-color 0.15s}
.search-input:focus{border-color:var(--accent)}
.search-input::placeholder{color:rgba(255,255,255,0.3)}
.filter-btn{font-family:var(--mono);font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:#FFFFFF;background:transparent;border:1px solid var(--border);padding:9px 16px;cursor:pointer;transition:all 0.15s}
.filter-btn:hover,.filter-btn.active{border-color:var(--accent);color:var(--accent)}
.export-btn{font-family:var(--mono);font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--bg);background:var(--accent);border:none;padding:9px 20px;cursor:pointer;margin-left:auto;transition:opacity 0.15s}
.export-btn:hover{opacity:0.88}

/* TABLE */
.table-wrap{padding:32px 40px}
.table-label{font-family:var(--mono);font-size:9px;letter-spacing:0.18em;text-transform:uppercase;color:#FFFFFF;margin-bottom:16px}

.lead-list{display:flex;flex-direction:column;gap:8px}

.lead-card{background:var(--surface);border:1px solid var(--border);cursor:pointer;transition:border-color 0.15s;position:relative;overflow:hidden}
.lead-card:hover{border-color:var(--border2)}
.lead-card.expanded{border-color:var(--accent)}
.lead-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;transition:background 0.2s}
.lead-card.level-1::before{background:#FF5555}
.lead-card.level-2::before{background:#FF8C00}
.lead-card.level-3::before{background:var(--orange)}
.lead-card.level-4::before{background:var(--green)}
.lead-card.level-5::before{background:var(--accent)}

.lead-summary{display:grid;grid-template-columns:48px 1fr 120px 140px 100px 80px;align-items:center;gap:16px;padding:16px 20px 16px 28px}
.lead-score{font-size:28px;font-weight:400;font-family:'DM Serif Display',serif;line-height:1}
.lead-name{font-size:14px;font-weight:500;color:#FFFFFF;margin-bottom:3px}
.lead-email{font-size:11px;font-family:var(--mono);color:#FFFFFF}
.lead-level{font-family:var(--mono);font-size:10px;letter-spacing:0.08em;text-transform:uppercase;padding:4px 10px;border:1px solid;display:inline-block}
.lead-industry{font-size:12px;color:#FFFFFF;font-family:var(--mono)}
.lead-date{font-size:10px;color:#FFFFFF;font-family:var(--mono);text-align:right}
.lead-expand{font-size:10px;color:#FFFFFF;text-align:right;transition:transform 0.2s}
.lead-card.expanded .lead-expand{transform:rotate(180deg)}

.lead-detail{display:none;padding:0 28px 20px;border-top:1px solid var(--border)}
.lead-card.expanded .lead-detail{display:block}

.domain-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin:16px 0}
.domain-item{}
.domain-label{font-family:var(--mono);font-size:9px;letter-spacing:0.08em;text-transform:uppercase;color:#FFFFFF;margin-bottom:6px}
.domain-score{font-size:20px;font-weight:500;margin-bottom:4px}
.domain-bar{height:2px;background:var(--border)}
.domain-fill{height:100%;transition:width 0.8s ease}

.detail-actions{display:flex;gap:10px;margin-top:16px}
.action-btn{font-family:var(--mono);font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:#FFFFFF;background:transparent;border:1px solid var(--border2);padding:8px 16px;cursor:pointer;transition:all 0.15s}
.action-btn:hover{border-color:var(--accent);color:var(--accent)}
.action-btn.orange{border-color:rgba(253,107,43,0.3);color:var(--orange)}
.action-btn.orange:hover{border-color:var(--orange)}

/* EMPTY STATE */
.empty{text-align:center;padding:80px 40px}
.empty-icon{font-size:40px;margin-bottom:16px}
.empty-title{font-size:18px;font-weight:500;margin-bottom:8px;color:#FFFFFF}
.empty-body{font-size:13px;color:#FFFFFF}

/* LOADING */
.loading{text-align:center;padding:80px 40px;font-family:var(--mono);font-size:12px;color:#FFFFFF;letter-spacing:0.1em}

@media(max-width:768px){
  .header{padding:16px 20px}
  .controls{padding:16px 20px}
  .table-wrap{padding:20px}
  .lead-summary{grid-template-columns:40px 1fr 80px;gap:10px}
  .lead-level,.lead-industry,.lead-date{display:none}
  .domain-grid{grid-template-columns:repeat(3,1fr)}
  .export-btn{display:none}
}
</style>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&display=swap" rel="stylesheet"/>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="login-wrap">
  <div class="login-card">
    <div class="login-eyebrow">// AIQ Admin</div>
    <div class="login-title">Dashboard Access</div>
    <div class="login-sub">Enter your admin password to view assessment submissions.</div>
    <input class="login-input" type="password" id="login-password" placeholder="Admin password" onkeydown="if(event.key==='Enter')login()"/>
    <button class="login-btn" onclick="login()">Sign In →</button>
    <div class="login-error" id="login-error">Incorrect password. Try again.</div>
  </div>
</div>

<!-- APP -->
<div class="app" id="app">
  <div class="header">
    <div class="header-brand">// AIQ &nbsp;·&nbsp; Admin Dashboard</div>
    <div class="header-right">
      <div class="header-stat">Total Submissions: <span id="stat-total">0</span></div>
      <div class="header-stat">Avg Score: <span id="stat-avg">0</span></div>
      <button class="logout-btn" onclick="logout()">Sign Out</button>
    </div>
  </div>

  <div class="controls">
    <input class="search-input" type="text" id="search-input" placeholder="Search by name or email..." oninput="filterLeads()"/>
    <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
    <button class="filter-btn" onclick="setFilter('1', this)">Unaware</button>
    <button class="filter-btn" onclick="setFilter('2', this)">Aware</button>
    <button class="filter-btn" onclick="setFilter('3', this)">Experimenting</button>
    <button class="filter-btn" onclick="setFilter('4', this)">Scaling</button>
    <button class="filter-btn" onclick="setFilter('5', this)">Transforming</button>
    <button class="export-btn" onclick="exportCSV()">Export CSV</button>
  </div>

  <div class="table-wrap">
    <div class="table-label" id="table-label">Loading submissions...</div>
    <div class="lead-list" id="lead-list"></div>
  </div>
</div>

<script>
const WORKER_URL = "https://jsn-aiq-kv.wewearsmiles.workers.dev";
const MATURITY = [
  { min:0,  max:20,  level:1, name:"Unaware",      color:"#FF5555" },
  { min:21, max:40,  level:2, name:"Aware",          color:"#FF8C00" },
  { min:41, max:60,  level:3, name:"Experimenting",  color:"#FD6B2B" },
  { min:61, max:80,  level:4, name:"Scaling",        color:"#5BE0A0" },
  { min:81, max:100, level:5, name:"Transforming",   color:"#1DC6C2" }
];
const DOMAINS = [
  { id:"data",       label:"Data",       color:"#1DC6C2" },
  { id:"strategy",   label:"Strategy",   color:"#FD6B2B" },
  { id:"talent",     label:"Talent",     color:"#5BE0A0" },
  { id:"current",    label:"Current AI", color:"#FF8C00" },
  { id:"governance", label:"Governance", color:"#BF80FF" }
];

let adminPassword = "";
let allLeads = [];
let activeFilter = "all";

function getMaturity(score) {
  return MATURITY.find(m => score >= m.min && score <= m.max) || MATURITY[0];
}

function getLevelNum(levelName) {
  const m = MATURITY.find(x => x.name === levelName);
  return m ? m.level : 0;
}

async function login() {
  const pw = document.getElementById("login-password").value.trim();
  const errEl = document.getElementById("login-error");
  if (!pw) return;

  errEl.style.display = "none";
  adminPassword = pw;

  try {
    const res = await fetch(WORKER_URL + "/leads", {
      headers: { "Authorization": "Bearer " + pw }
    });
    if (res.status === 401) {
      errEl.style.display = "block";
      adminPassword = "";
      return;
    }
    const data = await res.json();
    allLeads = data.leads || [];
    document.getElementById("login-wrap").style.display = "none";
    document.getElementById("app").style.display = "block";
    renderStats();
    renderLeads();
  } catch(err) {
    errEl.textContent = "Connection error. Check worker URL.";
    errEl.style.display = "block";
  }
}

function logout() {
  adminPassword = "";
  allLeads = [];
  document.getElementById("login-password").value = "";
  document.getElementById("login-wrap").style.display = "flex";
  document.getElementById("app").style.display = "none";
}

function renderStats() {
  document.getElementById("stat-total").textContent = allLeads.length;
  const avg = allLeads.length
    ? Math.round(allLeads.reduce((s, l) => s + (l.score || 0), 0) / allLeads.length)
    : 0;
  document.getElementById("stat-avg").textContent = avg;
}

function setFilter(filter, btn) {
  activeFilter = filter;
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  renderLeads();
}

function filterLeads() { renderLeads(); }

function getFilteredLeads() {
  const search = document.getElementById("search-input").value.toLowerCase();
  return allLeads.filter(lead => {
    const matchSearch = !search ||
      (lead.name || "").toLowerCase().includes(search) ||
      (lead.email || "").toLowerCase().includes(search);
    const matchFilter = activeFilter === "all" ||
      String(getLevelNum(lead.level)) === activeFilter;
    return matchSearch && matchFilter;
  });
}

function renderLeads() {
  const leads = getFilteredLeads();
  const list = document.getElementById("lead-list");
  const label = document.getElementById("table-label");

  label.textContent = leads.length + " submission" + (leads.length !== 1 ? "s" : "");

  if (!leads.length) {
    list.innerHTML = `
      <div class="empty">
        <div class="empty-icon">◈</div>
        <div class="empty-title">No submissions found</div>
        <div class="empty-body">No assessment results match your current filter.</div>
      </div>`;
    return;
  }

  list.innerHTML = leads.map((lead, i) => {
    const m = getMaturity(lead.score || 0);
    const date = lead.submittedAt
      ? new Date(lead.submittedAt).toLocaleDateString("en-US", { month:"short", day:"numeric", year:"numeric" })
      : "Unknown";

    const domainBars = DOMAINS.map(d => {
      const score = lead.domainScores?.[d.id] ?? 0;
      return `
        <div class="domain-item">
          <div class="domain-label">${d.label}</div>
          <div class="domain-score" style="color:${d.color}">${score}</div>
          <div class="domain-bar"><div class="domain-fill" style="width:${score}%;background:${d.color}"></div></div>
        </div>`;
    }).join("");

    const summaryText = [
      "AIQ Assessment Summary",
      "Name: " + (lead.name || "Unknown"),
      "Email: " + (lead.email || "Unknown"),
      "Score: " + (lead.score || 0) + "/100",
      "Level: " + (lead.level || "Unknown"),
      "Industry: " + (lead.industry || "Not specified"),
      "Date: " + date,
      "",
      "Domain Scores:",
      ...DOMAINS.map(d => "  " + d.label + ": " + (lead.domainScores?.[d.id] ?? 0) + "/100"),
      "",
      "Generated by JSN Made AIQ"
    ].join("\n");

    return `
      <div class="lead-card level-${m.level}" id="card-${i}">
        <div class="lead-summary" onclick="toggleCard(${i})">
          <div class="lead-score" style="color:${m.color}">${lead.score || 0}</div>
          <div>
            <div class="lead-name">${lead.name || "Unknown"}</div>
            <div class="lead-email">${lead.email || "Unknown"}</div>
          </div>
          <div class="lead-level" style="border-color:${m.color};color:${m.color}">${m.name}</div>
          <div class="lead-industry">${lead.industry || "Not specified"}</div>
          <div class="lead-date">${date}</div>
          <div class="lead-expand">▼</div>
        </div>
        <div class="lead-detail">
          <div class="domain-grid">${domainBars}</div>
          <div class="detail-actions">
            <button class="action-btn" onclick="copySummary(\`${summaryText.replace(/`/g, "'")}\`)">Copy Summary</button>
            <button class="action-btn orange" onclick="window.open('https://calendly.com/jsnmade-pm/30min','_blank')">Book Discovery Call</button>
            <button class="action-btn" onclick="window.open('mailto:${lead.email}','_blank')">Send Email</button>
          </div>
        </div>
      </div>`;
  }).join("");
}

function toggleCard(i) {
  const card = document.getElementById("card-" + i);
  card.classList.toggle("expanded");
}

function copySummary(text) {
  navigator.clipboard.writeText(text).then(() => alert("Summary copied to clipboard."));
}

function exportCSV() {
  const leads = getFilteredLeads();
  const headers = ["Name","Email","Score","Level","Industry","Date","Data","Strategy","Talent","Current AI","Governance"];
  const rows = leads.map(l => [
    l.name || "",
    l.email || "",
    l.score || 0,
    l.level || "",
    l.industry || "",
    l.submittedAt ? new Date(l.submittedAt).toLocaleDateString() : "",
    l.domainScores?.data ?? 0,
    l.domainScores?.strategy ?? 0,
    l.domainScores?.talent ?? 0,
    l.domainScores?.current ?? 0,
    l.domainScores?.governance ?? 0
  ]);
  const csv = [headers, ...rows].map(r => r.map(v => `"${v}"`).join(",")).join("\n");
  const blob = new Blob([csv], { type: "text/csv" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "aiq-leads-" + new Date().toISOString().split("T")[0] + ".csv";
  a.click();
}

document.getElementById("login-password").addEventListener("keydown", e => {
  if (e.key === "Enter") login();
});
</script>
</body>
</html>
